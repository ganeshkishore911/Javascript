<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Delegation Color Change</title>
</head>
<body>


<ul id="todoList">
    <li>Task 1</li>
    <li>Task 2</li>
    <li>Task 3</li>
</ul>

<script>

// ul handles event using event.target
//tagName is specify the tag

document.getElementById("todoList").addEventListener("click",(e)=>{
    
    // check clicked element is LI
    if(e.target.tagName === "LI"){
        
        e.target.style.backgroundColor = "yellow"
        e.target.style.color="red"
    }
})

</script>

</body>
</html>
